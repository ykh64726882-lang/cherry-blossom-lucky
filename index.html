<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🌸 벚꽃 오늘의 운세</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background: linear-gradient(#ffe6f2,#ffffff);
    padding-top:50px;
}

.container{
    background:white;
    width:400px;
    margin:auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

button{
    padding:10px 20px;
    font-size:18px;
    background:#ff6fa5;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="container">

<h1>🌸 벚꽃 오늘의 운세 🔮</h1>

<input id="name" placeholder="이름 입력 (필수!)" />
<br><br>

<button onclick="drawFortune()">운세 뽑기</button>

<div class="result" id="result"></div>

</div>

<script>

function drawFortune(){

const love = [
"오늘은 새로운 인연을 만날 가능성이 있습니다.",
"짝사랑이 조금 진전될 수 있습니다.",
"연애보다 친구들과 노는 것이 더 즐거운 날입니다.",
"벚꽃 아래에서 좋은 일이 생길지도 모릅니다.",
"오늘은 용기를 내도 좋은 날입니다.",
"예상치 못한 곳에서 새로운 인연이 시작됩니다."
];

const coding = [
"오늘은 버그가 평소보다 덜 생길 것입니다.",
"Stack Overflow를 여러 번 찾게 될 수도 있습니다.",
"코딩이 surprisingly 잘 풀리는 날입니다.",
"예상치 못한 오류가 나타날 수 있습니다."
];

const lucky = [
"딸기 음료",
"벚꽃 사진 찍기",
"친구와 산책",
"달콤한 디저트",
"노트북 스티커",
"밤에 산책하기"
];

let luck = Math.floor(Math.random()*60)+40;

let loveResult = love[Math.floor(Math.random()*love.length)];
let codingResult = coding[Math.floor(Math.random()*coding.length)];
let luckyItem = lucky[Math.floor(Math.random()*lucky.length)];

let name = document.getElementById("name").value;

let text = `
<h2>${name ? name + "님의" : ""} 오늘의 운세</h2>

<p>🍀 행운지수: <b>${luck}%</b></p>

<p>💖 연애운<br>${loveResult}</p>

<p>💻 코딩운<br>${codingResult}</p>

<p>🌟 행운 아이템<br>${luckyItem}</p>
`;

document.getElementById("result").innerHTML = text;

}

</script>

</body>
</html>
